# Discord Bot Compose (CPU version)
#
# Run with: docker compose -f discord-bot-compose.cpu.yml up -d
#
# For low-resource setups. Whisper uses the smaller 'base' model (CPU inference).
# Foundry URL assumes Foundry is running on the same machine as Docker (host.docker.internal).
#
# Requires:
#   - Discord bot .env file at ./discord-bot/.env
#   - Environment variables: DISCORD_TOKEN, FOUNDRY_USER, FOUNDRY_PASS, FOUNDRY_API_KEY

services:
  whisper:
    image: whisper-asr-webservice:latest
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-base}
      - ASR_ENGINE=openai_whisper
    restart: unless-stopped

  discord-bot:
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file: ./discord-bot/.env
    environment:
      - WHISPER_URL=http://whisper:9000
      - FOUNDRY_URL=http://host.docker.internal:13348
    depends_on:
      - whisper
    restart: unless-stopped