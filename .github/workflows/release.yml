name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release v')

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./foundry

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from commit message
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oP 'v\d+\.\d+\.\d+')
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from commit message: $MSG"
            exit 1
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "num=${VERSION#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: foundry/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Bump version in package.json
        working-directory: .
        run: |
          npm pkg set version=${{ steps.version.outputs.num }} --prefix foundry
          npm pkg set version=${{ steps.version.outputs.num }} --prefix client

      - name: Build release zip
        run: npm run release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          files: |
            foundry/package/beavers-ai-assistant.zip
            foundry/package/module.json

  publish-client:
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --provenance --access public